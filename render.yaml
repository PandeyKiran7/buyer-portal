# Render Blueprint: https://render.com/docs/blueprint-spec
# After deploy, set CLIENT_ORIGIN in the dashboard to your Vercel URL (CORS).

services:
  - type: web
    name: buyer-portal-api
    runtime: node
    plan: free
    region: oregon
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false
